appId: com.limajuice.liftlog
---
# Start a freeform workout and add a cardio exercise
- launchApp
# A cold dev-client launch can take up to a minute to fetch the bundle from Metro
- extendedWaitUntil:
    visible: 'Workout'
    timeout: 60000
- tapOn: 'Workout'
# Text matching is case-insensitive by default, which would also match the "Freeform Workout"
# cards in the list, so `(?-i)` pins this to the button's own casing.
- tapOn: '(?-i)Freeform workout'
# A session left in progress by an earlier run has to be replaced before a fresh one starts
- runFlow:
    when:
      visible: 'Replace current workout?'
    commands:
      - tapOn: 'Replace'
- tapOn: 'Add exercise'
- tapOn:
    id: 'cardio-button'
- back

# Add a time tracker; the timer appears.
# Anchored so it picks the menu item over the "Total workout time" summary row.
- tapOn:
    id: 'add-tracker-button'
- tapOn: '^Time$'
- assertVisible:
    id: 'cardio-timer-play-pause'

# Start and stop the timer (verifies play/pause without a flaky elapsed-time check)
- tapOn:
    id: 'cardio-timer-play-pause'
- tapOn:
    id: 'cardio-timer-play-pause'

# When stopped the timer is editable; set 45 seconds and confirm it takes
- tapOn:
    id: 'timer-editor-seconds'
- eraseText
- inputText: '45'
- hideKeyboard
- assertVisible: '45'

# Finish the (incomplete) session and confirm
- tapOn:
    id: 'finish-session-button'
- tapOn:
    id: 'action-ok'
