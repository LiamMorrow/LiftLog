name: Build Android

on:
  push:
    branches-ignore: [main]
    paths:
      - app/**
      - .github/**

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{secrets.SENTRY_AUTH_TOKEN_REACT}}
      # Speeds up Gradle by caching configuration and running tasks in parallel
      GRADLE_OPTS: -Dorg.gradle.configuration-cache=true -Dorg.gradle.parallel=true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./app/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3.2.2

      - name: Install dependencies
        run: npm ci
        working-directory: ./app

      # Pre-bundle JS to avoid doing it inside Gradle
      - name: Prebundle JavaScript
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
        working-directory: ./app

      # Cache Gradle, node_modules, and build intermediates
      - uses: burrunan/gradle-cache-action@v3
        name: Build Android (optimized)
        with:
          job-id: android
          arguments: assembleDebug
          build-root-directory: ./app/android
          gradle-version: wrapper
