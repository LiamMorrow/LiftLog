name: Release Android
on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Version code (e.g., 1.0.0)"
        required: true
        type: string
      release_notes:
        description: "Release notes to display in the store"
        required: true
        type: string
      commit_sha:
        description: "Commit SHA to checkout (optional, defaults to the branch head)"
        required: false
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_REVENUECAT_GOOGLE_API_KEY: ${{secrets.EXPO_REVENUECAT_GOOGLE_API_KEY}}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ./app/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3.2.2

      - name: Install
        run: npm ci
        working-directory: ./app
      - name: Prebuild
        run: npm run prebuild
        working-directory: ./app

      - name: Put keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > liftlog.keystore
        working-directory: ./app/android/app

      - uses: mlilback/build-number@v1
        name: Set build number
        id: buildNumber
        with:
          base: 100
          run-id: ${{github.run_number}}

      - name: Build Android AAB
        run: ./gradlew bundleRelease
          -PANDROID_UPLOAD_STORE_FILE=liftlog.keystore
          '-PANDROID_UPLOAD_STORE_PASSWORD=${{secrets.ANDROID_KEYSTORE_PASS}}'
          -PANDROID_UPLOAD_KEY_ALIAS=liftlog
          '-PANDROID_UPLOAD_KEY_PASSWORD=${{secrets.ANDROID_KEYSTORE_PASS}}'
          '-PDISPLAY_VERSION=${{ inputs.version_code }}'
          '-PBUILD_NUMBER=${{ steps.buildNumber.outputs.build-number }}'
        working-directory: ./app/android

      - name: Create release notes directory
        run: mkdir -p release_notes

      - name: Write release notes
        run: echo "${{ inputs.release_notes }}" > release_notes/whatsnew-en-AU

      - name: Upload AAB to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-release-aab
          path: app/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Android Release to Play Store
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          packageName: com.limajuice.liftlog
          releaseFiles: app/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          whatsNewDirectory: release_notes

      - name: Build Android APK
        run: ./gradlew assembleRelease
          -PANDROID_UPLOAD_STORE_FILE=liftlog.keystore
          '-PANDROID_UPLOAD_STORE_PASSWORD=${{secrets.ANDROID_KEYSTORE_PASS}}'
          -PANDROID_UPLOAD_KEY_ALIAS=liftlog
          '-PANDROID_UPLOAD_KEY_PASSWORD=${{secrets.ANDROID_KEYSTORE_PASS}}'
          '-PDISPLAY_VERSION=${{ inputs.version_code }}'
          '-PBUILD_NUMBER=${{ steps.buildNumber.outputs.build-number }}'
        working-directory: ./app/android

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: app/android/app/build/outputs/apk/release/app-release.apk
          tag_name: ${{ inputs.version_code }}
