name: Release Android
on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Version code (e.g., 1.0.0)"
        required: true
        type: string
      release_notes:
        description: "Release notes to display in the store"
        required: true
        type: string
      commit_sha:
        description: "Commit SHA to checkout (optional, defaults to the branch head)"
        required: false
        type: string
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Upload APK to the GitHub release
    env:
      EXPO_PUBLIC_REVENUECAT_GOOGLE_API_KEY: ${{secrets.EXPO_REVENUECAT_GOOGLE_API_KEY}}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ./app/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install
        run: npm ci
        working-directory: ./app
      - name: Generate Expo types
        run: npx expo customize tsconfig.json
        working-directory: ./app
      - name: Typecheck
        run: npm run typecheck
        working-directory: ./app
      - name: Lint
        run: npm run lint
        working-directory: ./app
      - name: Test
        run: npm test
        working-directory: ./app
      - name: Prebuild
        run: npm run prebuild
        working-directory: ./app

      - name: Put keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > liftlog.keystore
        working-directory: ./app/android/app

      - uses: mlilback/build-number@81a5eb0abae9b77d036138284ba1094d49acbc32 # v1
        name: Set build number
        id: buildNumber
        with:
          base: 100
          run-id: ${{github.run_number}}

      - name: Build Android AAB
        env:
          ORG_GRADLE_PROJECT_ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ORG_GRADLE_PROJECT_ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          DISPLAY_VERSION: ${{ inputs.version_code }}
          BUILD_NUMBER: ${{ steps.buildNumber.outputs.build-number }}
        run: ./gradlew bundleRelease
          -PreactNativeArchitectures=arm64-v8a,armeabi-v7a
          -PANDROID_UPLOAD_STORE_FILE=liftlog.keystore
          -PANDROID_UPLOAD_KEY_ALIAS=liftlog
          "-PDISPLAY_VERSION=$DISPLAY_VERSION"
          "-PBUILD_NUMBER=$BUILD_NUMBER"
        working-directory: ./app/android

      - name: Create release notes directory
        run: mkdir -p release_notes

      - name: Write release notes
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: printf '%s' "$RELEASE_NOTES" > release_notes/whatsnew-en-AU

      - name: Upload AAB to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-release-aab
          path: app/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Android Release to Play Store
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1.1.3
        with:
          packageName: com.limajuice.liftlog
          releaseFiles: app/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          whatsNewDirectory: release_notes

      - name: Build Android APK
        env:
          ORG_GRADLE_PROJECT_ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ORG_GRADLE_PROJECT_ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          DISPLAY_VERSION: ${{ inputs.version_code }}
          BUILD_NUMBER: ${{ steps.buildNumber.outputs.build-number }}
        run: ./gradlew assembleRelease
          -PreactNativeArchitectures=arm64-v8a,armeabi-v7a
          -PANDROID_UPLOAD_STORE_FILE=liftlog.keystore
          -PANDROID_UPLOAD_KEY_ALIAS=liftlog
          "-PDISPLAY_VERSION=$DISPLAY_VERSION"
          "-PBUILD_NUMBER=$BUILD_NUMBER"
        working-directory: ./app/android

      - name: Upload APK to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: app/android/app/build/outputs/apk/release/app-release.apk
          tag_name: ${{ inputs.version_code }}
