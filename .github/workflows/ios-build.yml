name: Build iOS

on:
  push:
    branches-ignore: [main]
    paths:
      - app/**
      - .github/**

jobs:
  build:
    runs-on: macos-15
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN_REACT }}
      KEYCHAIN: job-${{ github.job }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
      DERIVED_DATA_PATH: ~/Library/Developer/Xcode/DerivedData

    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 16.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: ./app/package-lock.json

      # Cache CocoaPods to avoid reinstalling every time
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install JS dependencies
        run: npm ci
        working-directory: ./app

      # Pre-bundle JS so Xcode doesn’t invoke Metro during archive
      - name: Prebundle JS
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios
        working-directory: ./app

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install
        working-directory: ./app

      # Cache DerivedData to enable incremental rebuilds
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v5
        with:
          p12-filepath: "liftlog.p12"
          p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASS }}
          keychain: ${{ env.KEYCHAIN }}

      # Fast archive (no export)
      - name: Archive iOS app
        run: |
          mkdir -p ios/build
          xcodebuild archive \
            -workspace ios/LiftLog.xcworkspace \
            -scheme LiftLog \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ios/build/App.xcarchive \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -parallelizeTargets \
            -quiet
        working-directory: ./app
