# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
#src: https://www.andreasnesheim.no/setting-up-ci-for-your-net-maui-ios-app-with-github-actions/

name: Release iOS

on:
  release:
    types: [created]
  push:
    branches: [ios-build-debugging]

jobs:
  build:
    runs-on: macos-15
    env:
      KEYCHAIN: job-${{ github.job }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
      SENTRY_AUTH_TOKEN: ${{secrets.SENTRY_AUTH_TOKEN_REACT}}
      EXPO_PUBLIC_REVENUECAT_APPLE_API_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_APPLE_API_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: mlilback/build-number@v1
        name: Set build number
        id: buildNumber
        with:
          base: 100
          run-id: ${{github.run_number}}
      - name: Put distribution cert
        env: # Or as an environment variable
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
        run: echo "${APPLE_DISTRIBUTION_CERT_P12_BASE64}" | base64 -d > liftlog.p12
      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v5
        with:
          p12-filepath: "liftlog.p12"
          p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASS }}
          keychain: ${{ env.KEYCHAIN }}
      - name: Download Apple Provisioning Profiles
        id: provision
        uses: Apple-Actions/download-provisioning-profiles@v4
        with:
          bundle-id: "com.limajuice.liftlog"
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install JS dependencies
        run: npm ci
        working-directory: ./app
      - name: Build JS bundle (optional)
        run: npx expo export --platform ios || echo "Skip if not needed"
        working-directory: ./app
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install
        working-directory: ./app
      - name: Generate exportOptions.plist
        working-directory: app
        run: |
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.limajuice.liftlog</key>
              <string>LiftLog</string>
            </dict>
            <key>compileBitcode</key>
            <true/>
            <key>destination</key>
            <string>export</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF
      - name: Archive iOS app
        run: |
          echo "Starting archive process..."
          echo "Current working directory: ${PWD}"
          echo "Creating build directory if it doesn't exist:"
          mkdir -p ios/build
          echo "Archive will be created at: ${PWD}/ios/build/App.xcarchive"

          xcodebuild archive \
            -workspace ios/LiftLog.xcworkspace \
            -scheme LiftLog \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "${PWD}/ios/build/App.xcarchive" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{secrets.APPLE_TEAM_ID}}" \
            APP_DISPLAY_VERSION="${{ github.event.release.name || '3.0.0' }}" \
            APP_VERSION="${{ steps.buildNumber.outputs.build-number }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ env.KEYCHAIN }}"

          echo "Archive command completed with exit code: $?"
          echo "Checking if archive was created:"
          ls -la "${PWD}/ios/build/App.xcarchive" || echo "Archive was not created at expected location"
          echo "Contents of ios/build after archive:"
          ls -la ios/build/
        working-directory: ./app
      - name: Debug - Check archive location
        run: |
          echo "Current working directory: ${PWD}"
          echo "=== Full app directory structure ==="
          find . -type d -name "build" 2>/dev/null || echo "No build directories found"
          echo "=== Looking for .xcarchive files anywhere in app dir ==="
          find . -name "*.xcarchive" -type d 2>/dev/null || echo "No .xcarchive files found"
          echo "=== Contents of app directory (top level) ==="
          ls -la .
          echo "=== Contents of ios directory ==="
          ls -la ios/ || echo "ios directory does not exist"
          echo "=== Contents of ios/build if it exists ==="
          ls -la ios/build/ || echo "ios/build directory does not exist"
          echo "=== All build-related directories ==="
          find . -type d -name "*build*" -exec ls -la {} \; 2>/dev/null || echo "No build directories found"
        working-directory: ./app
      - name: Export IPA
        run: |
          echo "About to export with archive path: ${PWD}/ios/build/App.xcarchive"
          echo "Checking if archive exists:"
          ls -la "${PWD}/ios/build/App.xcarchive" || echo "Archive not found at expected location"
          xcodebuild -exportArchive \
            -archivePath "${PWD}/ios/build/App.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath "${PWD}/ios/build/export" \
            DEVELOPMENT_TEAM=${{secrets.APPLE_TEAM_ID}}
        working-directory: ./app
      - name: Upload with altool
        run: xcrun altool --upload-app -f app/ios/build/export/LiftLog.ipa -t ios -p '${{secrets.APPLE_UPLOAD_PASS}}' -u ${{secrets.APPLE_UPLOAD_USER}}
