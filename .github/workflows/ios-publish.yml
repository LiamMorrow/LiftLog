name: Release iOS

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-15
    env:
      KEYCHAIN: job-${{ github.job }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
      SENTRY_AUTH_TOKEN: ${{secrets.SENTRY_AUTH_TOKEN_REACT}}
      EXPO_PUBLIC_REVENUECAT_APPLE_API_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_APPLE_API_KEY }}
      # Enable parallel Xcode and disable indexing for speed
      XCODE_XCCONFIG: CI=1
      # Reuse DerivedData and other caches
      DERIVED_DATA_PATH: ~/Library/Developer/Xcode/DerivedData

    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 16.4.0

      - uses: mlilback/build-number@v1
        name: Set build number
        id: buildNumber
        with:
          base: 100
          run-id: ${{ github.run_number }}

      - name: Put distribution cert
        env:
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
        run: echo "${APPLE_DISTRIBUTION_CERT_P12_BASE64}" | base64 -d > liftlog.p12

      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v5
        with:
          p12-filepath: "liftlog.p12"
          p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASS }}
          keychain: ${{ env.KEYCHAIN }}

      - name: Download Apple Provisioning Profiles
        id: provision
        uses: Apple-Actions/download-provisioning-profiles@v4
        with:
          bundle-id: "com.limajuice.liftlog"
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: ./app/package-lock.json

      # Cache CocoaPods
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install JS dependencies
        run: npm ci
        working-directory: ./app

      # Pre-bundle JS to avoid Metro startup inside Xcode
      - name: Prebundle JS
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios
        working-directory: ./app

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install
        working-directory: ./app

      # Cache DerivedData for incremental builds
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Generate exportOptions.plist
        working-directory: app
        run: |
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.limajuice.liftlog</key>
              <string>LiftLog</string>
            </dict>
            <key>compileBitcode</key>
            <true/>
            <key>destination</key>
            <string>export</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Archive iOS app
        run: |
          mkdir -p ios/build
          xcodebuild archive \
            -workspace ios/LiftLog.xcworkspace \
            -scheme LiftLog \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "${PWD}/ios/build/App.xcarchive" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            APP_DISPLAY_VERSION="${{ github.event.release.name }}" \
            APP_VERSION="${{ steps.buildNumber.outputs.build-number }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ env.KEYCHAIN }}" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -parallelizeTargets \
            -quiet
        working-directory: ./app

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "${PWD}/ios/build/App.xcarchive" \
            -exportOptionsPlist exportOptions.plist \
            -exportPath "${PWD}/ios/build/export" \
            DEVELOPMENT_TEAM=${{secrets.APPLE_TEAM_ID}} \
            -quiet
        working-directory: ./app

      - name: Upload to App Store
        run: |
          xcrun altool --upload-app \
            -f app/ios/build/export/LiftLog.ipa \
            -t ios \
            -p '${{ secrets.APPLE_UPLOAD_PASS }}' \
            -u ${{ secrets.APPLE_UPLOAD_USER }}
